apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transit-analytics-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yurii-hr/open-data-ai-analytics.git'
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: transit-analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true