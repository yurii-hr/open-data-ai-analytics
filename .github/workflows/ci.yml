name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/ci-pipeline" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Select module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality
          - data_research
          - visualization

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.module }}" != "all" ]; then
            echo "matrix=[\"${{ github.event.inputs.module }}\"]" >> $GITHUB_OUTPUT
          else
            echo 'matrix=["data_load","data_quality","data_research","visualization"]' >> $GITHUB_OUTPUT
          fi

  run-modules:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run module
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Running script src/${{ matrix.module }}.py..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}

  deploy-pages:
    needs: run-modules
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Download visualization artifacts
        uses: actions/download-artifact@v4
        with:
          name: logs-visualization
          path: public
        continue-on-error: true

      - name: Create index.html if not exists
        run: |
          mkdir -p public
          if [ ! -f public/index.html ]; then
            echo "<!DOCTYPE html><html><head><meta charset='utf-8'><title>CI/CD Visualization</title></head><body>" > public/index.html
            echo "<h1>Visualization Module Results</h1>" >> public/index.html
            echo "<p>This is an automatically generated CI/CD Pipeline page (Part B - Option 2).</p>" >> public/index.html
            echo "<h2>Execution Log (run.log):</h2>" >> public/index.html
            echo "<pre>" >> public/index.html
            cat public/run.log 2>/dev/null || echo "Log unavailable" >> public/index.html
            echo "</pre></body></html>" >> public/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4