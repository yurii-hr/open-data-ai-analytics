package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose
  - git

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - mkdir -p /opt/app
  - git clone https://github.com/yurii-hr/open-data-ai-analytics.git /opt/app
  - cd /opt/app && sudo docker-compose up --build -d